name: Restrict merges to main

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce branch policy
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "dev-test" ]]; then
            echo "Only dev-test can merge into main"
            exit 1
          fi
